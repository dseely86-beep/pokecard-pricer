<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>PokéCard Pricer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.7s linear infinite; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade { animation: fadeSlide 0.18s ease; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
    input:focus { outline: none; border-color: #58a6ff !important; }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */

async function splitImage(src, rows, cols) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const cw = Math.floor(img.width / cols);
      const ch = Math.floor(img.height / rows);
      const cells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cv = document.createElement('canvas');
          cv.width = cw; cv.height = ch;
          cv.getContext('2d').drawImage(img, c * cw, r * ch, cw, ch, 0, 0, cw, ch);
          cells.push(cv.toDataURL('image/jpeg', 0.85));
        }
      }
      res(cells);
    };
    img.onerror = rej;
    img.src = src;
  });
}

async function searchCards(query) {
  if (!query || query.trim().length < 2) return [];
  const q = query.trim();
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000);

  const fetchLang = async (lang, name) => {
    try {
      const r = await fetch(
        `https://api.tcgdex.net/v2/${lang}/cards?name=${encodeURIComponent(name)}`,
        { signal: controller.signal }
      );
      if (!r.ok) return [];
      const d = await r.json();
      if (!Array.isArray(d)) return [];
      d.forEach(c => { c._lang = lang; });
      return d;
    } catch { return []; }
  };

  try {
    // Search EN + JA in parallel
    const [en, ja] = await Promise.all([fetchLang('en', q), fetchLang('ja', q)]);
    clearTimeout(timeout);
    const combined = [...en, ...ja];
    if (combined.length > 0) return combined.slice(0, 40);

    // Fallback: first word only
    const [en2, ja2] = await Promise.all([
      fetchLang('en', q.split(' ')[0]),
      fetchLang('ja', q.split(' ')[0]),
    ]);
    return [...en2, ...ja2].slice(0, 40);
  } catch { return []; }
}

async function ocrCardName(imgSrc) {
  try {
    // Crop top ~22% of the image — that's where the name lives on most cards
    const img = await new Promise((res, rej) => {
      const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = imgSrc;
    });
    const canvas = document.createElement('canvas');
    const cropH = Math.max(40, Math.floor(img.height * 0.22));
    canvas.width = img.width; canvas.height = cropH;
    canvas.getContext('2d').drawImage(img, 0, 0, img.width, cropH, 0, 0, img.width, cropH);
    const cropped = canvas.toDataURL('image/jpeg', 0.92);
    const result = await Tesseract.recognize(cropped, 'eng', { logger: () => {} });
    const raw = result.data.text || '';
    // Clean up: remove non-name characters, pick the best candidate line
    const lines = raw.split('\n')
      .map(l => l.replace(/[^a-zA-Z\s'\-.éÉ]/g, ' ').trim())
      .filter(l => l.length >= 2);
    const name = lines.find(l => /[a-zA-Z]{2,}/.test(l) && !/^hp$/i.test(l.trim())) || lines[0] || '';
    return name.replace(/\s+/g, ' ').trim();
  } catch { return ''; }
}

function getPrice(card) {
  if (!card) return null;
  // TCGdex format
  const p = card.pricing;
  if (p) {
    // TCGPlayer USD (preferred)
    const tp = p.tcgplayer;
    if (tp) {
      for (const v of ['holofoil','reverseHolofoil','normal','unlimitedHolofoil',
                       'unlimited','1stEditionHolofoil','1stEditionNormal']) {
        if (tp[v]?.market != null) return tp[v].market;
      }
      for (const v of Object.keys(tp)) {
        if (tp[v]?.market != null) return tp[v].market;
      }
    }
    // Cardmarket EUR (fallback — close enough for ballpark)
    if (p.cardmarket?.avg != null)   return p.cardmarket.avg;
    if (p.cardmarket?.trend != null) return p.cardmarket.trend;
  }
  // Legacy pokemontcg.io format (backwards compat)
  const tpl = card.tcgplayer?.prices;
  if (tpl) {
    for (const v of ['holofoil','reverseHolofoil','normal']) {
      if (tpl[v]?.market != null) return tpl[v].market;
    }
  }
  return null;
}

const $p = p => p != null
  ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(p)
  : '—';

const $c = p => {
  if (p == null) return '#6e7681';
  if (p >= 50)   return '#ffd700';
  if (p >= 10)   return '#4fc3f7';
  if (p >= 1)    return '#81c784';
  return '#6e7681';
};

const STORE = 'pokepricer_v2';
const loadColl = () => { try { return JSON.parse(localStorage.getItem(STORE) || '[]'); } catch { return []; } };
const saveColl = c => { try { localStorage.setItem(STORE, JSON.stringify(c)); } catch {} };

/* ═══════════════════════════════════════════════
   CARD IDENTIFIER (one row per cell)
═══════════════════════════════════════════════ */

// Cache search results so the same name never hits the API twice
const _searchCache = new Map();
// Cache full card details (for price + set name) so each card is only fetched once
const _detailCache = new Map();

function CardIdentifier({ index, cellImg, onSelect }) {
  const [q, setQ]        = useState('');
  const [results, setRes] = useState([]);
  const [selected, setSel] = useState(null);
  const [loading, setLoad] = useState(false);
  const [open, setOpen]   = useState(false);
  const [error, setError] = useState('');
  const [ocrBusy, setOcrBusy] = useState(false);
  const ref = useRef(null);

  const doSearch = async (name) => {
    const key = name.trim().toLowerCase();
    if (key.length < 2) return;
    setError('');
    // Return cached result instantly
    if (_searchCache.has(key)) {
      const cached = _searchCache.get(key);
      setRes(cached); setOpen(cached.length > 0);
      if (cached.length === 0) setError('No cards found — try a different spelling');
      return;
    }
    setLoad(true);
    const r = await searchCards(name.trim());
    setLoad(false);
    _searchCache.set(key, r);
    setRes(r); setOpen(r.length > 0);
    if (r.length === 0) setError('No cards found — try a different spelling');
  };

  useEffect(() => {
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('pointerdown', fn);
    return () => document.removeEventListener('pointerdown', fn);
  }, []);

  const pick = async (basicCard) => {
    // Confirm immediately with basic info so UX feels instant
    const interim = { card: basicCard, price: null };
    setSel(interim); setOpen(false); setQ(''); setError('');
    onSelect(interim);
    // Fetch full card detail in background for price + set name
    try {
      const key = basicCard.id;
      let full = basicCard;
      if (_detailCache.has(key)) {
        full = _detailCache.get(key);
      } else {
        const lang = basicCard._lang || 'en';
        const r = await fetch(`https://api.tcgdex.net/v2/${lang}/cards/${basicCard.id}`);
        if (r.ok) { full = await r.json(); full._lang = lang; _detailCache.set(key, full); }
      }
      const price = getPrice(full);
      setSel({ card: full, price });
      onSelect({ card: full, price });
    } catch {}
  };
  const clear = () => { setSel(null); setQ(''); setError(''); setRes([]); onSelect(null); };

  return (
    <div className="fade" style={{
      display: 'flex', alignItems: 'flex-start', gap: '10px',
      padding: '12px', background: '#161b22', borderRadius: '12px',
      marginBottom: '8px',
      border: `1px solid ${selected ? '#238636' : '#30363d'}`,
      transition: 'border-color 0.2s',
    }}>
      {/* Badge */}
      <div style={{
        width: '22px', height: '22px', borderRadius: '50%', flexShrink: 0,
        background: selected ? '#238636' : '#21262d',
        color: selected ? '#fff' : '#6e7681',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: '10px', fontWeight: 700, marginTop: '3px',
      }}>{index + 1}</div>

      {/* Cropped cell image */}
      <img src={cellImg} alt="" style={{
        width: '62px', height: '86px', objectFit: 'cover',
        borderRadius: '6px', flexShrink: 0, border: '1px solid #30363d',
      }} />

      {/* Right side */}
      <div style={{ flex: 1, minWidth: 0 }} ref={ref}>
        {selected ? (
          /* ── Confirmed card ── */
          <div style={{ display: 'flex', gap: '8px', alignItems: 'flex-start' }}>
            {selected.card.image && (
              <img src={selected.card.image + '/high.webp'} alt="" style={{
                width: '40px', height: '56px', objectFit: 'cover',
                borderRadius: '4px', flexShrink: 0,
              }} />
            )}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600, fontSize: '12px', color: '#e6edf3', lineHeight: 1.4 }}>
                {selected.card.name}
              </div>
              <div style={{ fontSize: '10px', color: '#6e7681', marginTop: '1px',
                overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                {selected.card.set?.name || selected.card.id?.slice(0, selected.card.id?.lastIndexOf('-'))}
              </div>
              <div style={{ fontSize: '10px', color: '#6e7681' }}>#{selected.card.localId || selected.card.number}</div>
              <div style={{ fontWeight: 700, fontSize: '14px', marginTop: '4px', color: $c(selected.price) }}>
               ${$p(selected.price)}
              </div>
            </div>
            <button onClick={clear} style={{
              background: 'none', border: 'none', color: '#6e7681',
              cursor: 'pointer', fontSize: '16px', lineHeight: 1, padding: 0, flexShrink: 0,
            }}>✕</button>
          </div>
        ) : (
          /* ── Search box ── */
          <div style={{ position: 'relative' }}>
            <div style={{ display: 'flex', gap: '6px' }}>
              <input
                value={q}
                onChange={e => { setQ(e.target.value); setError(''); }}
                onKeyDown={e => e.key === 'Enter' && doSearch(q)}
                onFocus={() => results.length > 0 && setOpen(true)}
                placeholder="Pokémon name…"
                style={{
                  flex: 1, padding: '8px 9px', minWidth: 0,
                  background: '#0d1117', border: '1px solid #30363d',
                  borderRadius: '6px', color: '#e6edf3', fontSize: '12px',
                }}
              />
              <button
                onClick={() => doSearch(q)}
                disabled={loading || ocrBusy || q.trim().length < 2}
                style={{
                  padding: '8px 10px', borderRadius: '6px', border: 'none',
                  background: loading || ocrBusy || q.trim().length < 2 ? '#21262d' : '#1f6feb',
                  color: loading || ocrBusy || q.trim().length < 2 ? '#484f58' : '#fff',
                  fontSize: '12px', fontWeight: 700, cursor: loading || ocrBusy || q.trim().length < 2 ? 'default' : 'pointer',
                  flexShrink: 0, whiteSpace: 'nowrap',
                }}
              >{loading ? '⟳' : 'Search'}</button>
              <button
                title="Auto-read card name"
                disabled={ocrBusy || loading}
                onClick={async () => {
                  setOcrBusy(true); setError('');
                  const name = await ocrCardName(cellImg);
                  setOcrBusy(false);
                  if (name && name.length >= 2) { setQ(name); doSearch(name); }
                  else setError("Couldn't read — try typing the name");
                }}
                style={{
                  padding: '8px 9px', borderRadius: '6px', border: 'none',
                  background: '#21262d', fontSize: '14px', flexShrink: 0,
                  color: ocrBusy ? '#484f58' : '#8b949e',
                  cursor: ocrBusy || loading ? 'default' : 'pointer',
                }}
              >{ocrBusy ? '⟳' : '📷'}</button>
              <button
                title="Search by image on Google Lens"
                onClick={async () => {
                  try {
                    const blob = await fetch(cellImg).then(r => r.blob());
                    await navigator.clipboard.write([new ClipboardItem({ 'image/jpeg': blob })]);
                    window.open('https://lens.google.com/', '_blank');
                    setError('Image copied! Paste it into Google Lens 📋');
                  } catch {
                    window.open('https://lens.google.com/', '_blank');
                    setError('Upload your card photo to Google Lens');
                  }
                }}
                style={{
                  padding: '8px 9px', borderRadius: '6px', border: 'none',
                  background: '#21262d', fontSize: '14px', flexShrink: 0,
                  color: '#8b949e', cursor: 'pointer',
                }}
              >🔍</button>
            </div>

            {error && !open && (
              <div style={{ fontSize: '11px', color: error.includes('copied') ? '#4fc3f7' : '#f85149', marginTop: '4px' }}>{error}</div>
            )}

            {open && results.length > 0 && (
              <div style={{
                position: 'absolute', top: 'calc(100% + 2px)', left: 0, right: 0,
                background: '#21262d', border: '1px solid #30363d', borderRadius: '8px',
                zIndex: 500, maxHeight: '280px', overflowY: 'auto',
                boxShadow: '0 8px 28px rgba(0,0,0,0.6)',
              }}>
                {results.map(card => (
                  <div key={card.id} onClick={() => pick(card)} style={{
                    display: 'flex', gap: '7px', padding: '7px 8px',
                    cursor: 'pointer', borderBottom: '1px solid #30363d',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = '#30363d'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                  >
                    {card.image && (
                      <img src={card.image + '/high.webp'} alt="" style={{
                        width: '28px', height: '40px', objectFit: 'cover',
                        borderRadius: '3px', flexShrink: 0,
                      }} />
                    )}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, fontSize: '11px', color: '#e6edf3',
                        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {card.name}
                      </div>
                      <div style={{ fontSize: '10px', color: '#6e7681',
                        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {card._lang === 'ja' ? '🇯🇵 ' : ''}{card.set?.name || card.id.slice(0, card.id.lastIndexOf('-'))} · #{card.localId || card.number}
                      </div>
                      <div style={{ fontSize: '10px', color: '#484f58' }}>Tap to confirm →</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════════ */

function HomeScreen({ collection, onScan, onView }) {
  const total = useMemo(() => collection.reduce((s, c) => s + (c.price || 0), 0), [collection]);
  const top   = useMemo(() => [...collection].sort((a, b) => (b.price || 0) - (a.price || 0))[0], [collection]);

  return (
    <div style={{ padding: '24px 16px', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* Hero */}
      <div style={{ textAlign: 'center', paddingTop: '36px', marginBottom: '32px' }}>
        <div style={{
          fontSize: '76px', lineHeight: 1, marginBottom: '12px',
          filter: 'drop-shadow(0 0 24px rgba(255,203,5,0.35))',
        }}>⚡</div>
        <h1 style={{
          fontSize: '34px', fontWeight: 900, letterSpacing: '-0.5px',
          background: 'linear-gradient(135deg, #ffcb05 0%, #ff6b35 100%)',
          WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
          backgroundClip: 'text', marginBottom: '8px',
        }}>PokéCard Pricer</h1>
        <p style={{ color: '#6e7681', fontSize: '14px' }}>Scan · Identify · Track your collection</p>
      </div>

      {/* Stats */}
      {collection.length > 0 && (
        <div style={{
          background: '#161b22', borderRadius: '16px', padding: '20px',
          marginBottom: '20px', border: '1px solid #30363d',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-around', marginBottom: top ? '14px' : 0 }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: '32px', fontWeight: 900, color: '#ffcb05', lineHeight: 1 }}>
                {collection.length}
              </div>
              <div style={{ fontSize: '11px', color: '#6e7681', marginTop: '3px' }}>Cards Scanned</div>
            </div>
            <div style={{ width: '1px', background: '#30363d' }} />
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: '32px', fontWeight: 900, color: '#4fc3f7', lineHeight: 1 }}>
                {$p(total)}
              </div>
              <div style={{ fontSize: '11px', color: '#6e7681', marginTop: '3px' }}>Total Value</div>
            </div>
          </div>

          {/* Top card preview */}
          {top && (
            <div style={{
              display: 'flex', alignItems: 'center', gap: '10px',
              background: '#0d1117', borderRadius: '10px', padding: '10px',
            }}>
              <span style={{ fontSize: '16px' }}>👑</span>
              {top.image && (
                <img src={top.image} alt="" style={{
                  width: '30px', height: '42px', objectFit: 'cover',
                  borderRadius: '3px', flexShrink: 0,
                }} />
              )}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: '12px', fontWeight: 600, color: '#e6edf3',
                  overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                }}>{top.name}</div>
                <div style={{
                  fontSize: '11px', color: '#6e7681',
                  overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                }}>{top.set}</div>
              </div>
              <div style={{ fontSize: '15px', fontWeight: 800, color: '#ffd700', flexShrink: 0 }}>
                {$p(top.price)}
              </div>
            </div>
          )}
        </div>
      )}

      {/* CTA buttons */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
        <button onClick={onScan} style={{
          padding: '17px', fontSize: '16px', fontWeight: 700,
          background: 'linear-gradient(135deg, #ffcb05, #ff9d00)',
          color: '#0d1117', border: 'none', borderRadius: '14px', cursor: 'pointer',
          boxShadow: '0 4px 22px rgba(255,203,5,0.28)',
        }}>
          📷 Scan Cards
        </button>
        {collection.length > 0 && (
          <button onClick={onView} style={{
            padding: '17px', fontSize: '16px', fontWeight: 700,
            background: '#21262d', color: '#e6edf3',
            border: '1px solid #30363d', borderRadius: '14px', cursor: 'pointer',
          }}>
            📦 View Collection ({collection.length})
          </button>
        )}
      </div>

      <p style={{
        textAlign: 'center', fontSize: '11px', color: '#484f58',
        marginTop: 'auto', paddingTop: '32px',
      }}>
        Prices via TCGdex · USD/EUR · May vary from actual market
      </p>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SCAN SCREEN
═══════════════════════════════════════════════ */

function Stepper({ label, value, min, max, onChange }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
      <div style={{ fontSize: '10px', color: '#6e7681', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: '0' }}>
        <button
          onClick={() => onChange(Math.max(min, value - 1))}
          disabled={value <= min}
          style={{
            width: '32px', height: '32px', borderRadius: '8px 0 0 8px',
            background: '#21262d', border: '1px solid #30363d', color: value <= min ? '#484f58' : '#e6edf3',
            fontSize: '18px', cursor: value <= min ? 'default' : 'pointer', lineHeight: 1,
          }}>−</button>
        <div style={{
          width: '38px', height: '32px', background: '#0d1117',
          border: '1px solid #30363d', borderLeft: 'none', borderRight: 'none',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: '16px', fontWeight: 700, color: '#e6edf3',
        }}>{value}</div>
        <button
          onClick={() => onChange(Math.min(max, value + 1))}
          disabled={value >= max}
          style={{
            width: '32px', height: '32px', borderRadius: '0 8px 8px 0',
            background: '#21262d', border: '1px solid #30363d', color: value >= max ? '#484f58' : '#e6edf3',
            fontSize: '18px', cursor: value >= max ? 'default' : 'pointer', lineHeight: 1,
          }}>+</button>
      </div>
    </div>
  );
}

function ScanScreen({ onBack, onCellsReady }) {
  const [imgSrc, setImg]       = useState(null);
  const [busy, setBusy]        = useState(false);
  const [webcamOn, setWcamOn]  = useState(false);
  const [stream, setStream]    = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [rows, setRows]        = useState(3);
  const [cols, setCols]        = useState(3);
  const fileRef  = useRef();
  const videoRef = useRef();

  const totalCards = rows * cols;
  const isMobile = typeof window !== 'undefined' &&
    ('ontouchstart' in window || navigator.maxTouchPoints > 0);

  /* ── webcam ── */
  const startWebcam = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      });
      setStream(s);
      setWcamOn(true);
      setTimeout(() => { if (videoRef.current) videoRef.current.srcObject = s; }, 80);
    } catch (e) {
      alert('Could not access camera: ' + e.message);
    }
  };

  const stopWebcam = () => {
    if (stream) stream.getTracks().forEach(t => t.stop());
    setStream(null); setWcamOn(false);
  };

  const captureFrame = () => {
    const v = videoRef.current;
    if (!v) return;
    const cv = document.createElement('canvas');
    cv.width = v.videoWidth; cv.height = v.videoHeight;
    cv.getContext('2d').drawImage(v, 0, 0);
    setImg(cv.toDataURL('image/jpeg', 0.92));
    stopWebcam();
  };

  useEffect(() => () => { if (stream) stream.getTracks().forEach(t => t.stop()); }, [stream]);

  /* ── file / drag ── */
  const loadFile = f => {
    if (!f || !f.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = ev => setImg(ev.target.result);
    r.readAsDataURL(f);
  };

  const handleDrop = e => {
    e.preventDefault(); setDragOver(false);
    loadFile(e.dataTransfer.files[0]);
  };

  const handleProcess = async () => {
    if (!imgSrc || busy) return;
    setBusy(true);
    try {
      const cells = await splitImage(imgSrc, rows, cols);
      onCellsReady(cells);
    } catch {
      alert('Could not process image. Please try again.');
      setBusy(false);
    }
  };

  /* ── webcam view ── */
  if (webcamOn) return (
    <div style={{ padding: '16px', minHeight: '100vh' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
        <button onClick={stopWebcam} style={{
          background: 'none', border: 'none', color: '#58a6ff',
          fontSize: '15px', cursor: 'pointer', padding: '4px 0',
        }}>← Back</button>
        <h2 style={{ fontSize: '20px', fontWeight: 700 }}>Camera</h2>
      </div>
      <div style={{
        background: '#000', borderRadius: '14px', overflow: 'hidden',
        marginBottom: '14px', position: 'relative',
      }}>
        <video ref={videoRef} autoPlay playsInline muted
          style={{ width: '100%', display: 'block', maxHeight: '60vh', objectFit: 'cover' }}
        />
        <div style={{
          position: 'absolute', inset: 0, border: '2px solid rgba(255,203,5,0.4)',
          borderRadius: '14px', pointerEvents: 'none',
        }} />
      </div>
      <p style={{ fontSize: '12px', color: '#6e7681', textAlign: 'center', marginBottom: '14px' }}>
        Frame all {totalCards} card{totalCards !== 1 ? 's' : ''} ({rows}×{cols}) in the viewfinder, then tap capture
      </p>
      <button onClick={captureFrame} style={{
        width: '100%', padding: '16px', fontSize: '16px', fontWeight: 700,
        background: 'linear-gradient(135deg, #ffcb05, #ff9d00)',
        color: '#0d1117', border: 'none', borderRadius: '14px', cursor: 'pointer',
        boxShadow: '0 4px 22px rgba(255,203,5,0.28)',
      }}>📸 Capture Photo</button>
    </div>
  );

  /* ── main view ── */
  return (
    <div style={{ padding: '16px', minHeight: '100vh' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '20px' }}>
        <button onClick={onBack} style={{
          background: 'none', border: 'none', color: '#58a6ff',
          fontSize: '15px', cursor: 'pointer', padding: '4px 0',
        }}>← Back</button>
        <h2 style={{ fontSize: '20px', fontWeight: 700 }}>Scan Cards</h2>
      </div>

      {/* Grid picker */}
      <div style={{
        background: '#161b22', border: '1px solid #30363d',
        borderRadius: '12px', padding: '14px', marginBottom: '14px',
      }}>
        <div style={{ fontSize: '12px', color: '#8b949e', marginBottom: '12px', textAlign: 'center' }}>
          How are your cards laid out?
        </div>
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '20px' }}>
          <Stepper label="Rows" value={rows} min={1} max={8} onChange={setRows} />
          <div style={{ fontSize: '22px', color: '#30363d', marginTop: '18px' }}>×</div>
          <Stepper label="Cols" value={cols} min={1} max={8} onChange={setCols} />
          <div style={{ marginTop: '18px', textAlign: 'center' }}>
            <div style={{ fontSize: '24px', fontWeight: 900, color: '#ffcb05', lineHeight: 1 }}>{totalCards}</div>
            <div style={{ fontSize: '10px', color: '#6e7681' }}>cards</div>
          </div>
        </div>
      </div>

      {/* Tips */}
      <div style={{
        background: '#161b22', border: '1px solid #30363d',
        borderRadius: '10px', padding: '12px', marginBottom: '14px',
        fontSize: '12px', color: '#8b949e', lineHeight: 1.6,
      }}>
        <strong style={{ color: '#e6edf3' }}>📸 For best results: </strong>
        Lay {totalCards} card{totalCards !== 1 ? 's' : ''} in a{' '}
        <strong style={{color:'#e6edf3'}}>{rows}×{cols} grid</strong> on a flat surface.
        Use good lighting, avoid glare, and fill the frame.
      </div>

      {/* Upload / drop zone */}
      {!imgSrc && (
        <div
          onClick={() => !busy && fileRef.current.click()}
          onDrop={handleDrop}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          style={{
            background: dragOver ? '#1c2733' : '#161b22',
            border: `2px dashed ${dragOver ? '#58a6ff' : '#30363d'}`,
            borderRadius: '14px', minHeight: '180px',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: busy ? 'default' : 'pointer',
            overflow: 'hidden', marginBottom: '12px',
            transition: 'border-color 0.2s, background 0.2s',
          }}
        >
          <div style={{ textAlign: 'center', padding: '28px', color: '#6e7681' }}>
            <div style={{ fontSize: '44px', marginBottom: '8px' }}>📁</div>
            <div style={{ fontSize: '15px', fontWeight: 600, color: '#e6edf3', marginBottom: '4px' }}>
              {isMobile ? 'Tap to choose photo' : 'Click or drag & drop image'}
            </div>
            <div style={{ fontSize: '12px' }}>JPG, PNG, HEIC, WEBP</div>
          </div>
        </div>
      )}

      {imgSrc && (
        <div style={{
          background: '#161b22', border: '2px solid #238636',
          borderRadius: '14px', overflow: 'hidden', marginBottom: '12px',
        }}>
          <img src={imgSrc} style={{ width: '100%', maxHeight: '380px', objectFit: 'contain', display: 'block' }} alt="Preview" />
        </div>
      )}

      <input
        ref={fileRef}
        type="file"
        accept="image/*"
        onChange={e => loadFile(e.target.files[0])}
        style={{ display: 'none' }}
      />

      {/* Action buttons */}
      {!imgSrc && (
        <div style={{ display: 'flex', gap: '10px', marginBottom: '12px' }}>
          <button onClick={() => !busy && fileRef.current.click()} style={{
            flex: 1, padding: '13px', fontSize: '14px', fontWeight: 600,
            background: '#21262d', color: '#e6edf3',
            border: '1px solid #30363d', borderRadius: '12px', cursor: 'pointer',
          }}>
            🖼️ {isMobile ? 'Photo Library' : 'Upload File'}
          </button>
          <button onClick={startWebcam} style={{
            flex: 1, padding: '13px', fontSize: '14px', fontWeight: 600,
            background: 'linear-gradient(135deg, #ffcb05, #ff9d00)',
            color: '#0d1117', border: 'none', borderRadius: '12px', cursor: 'pointer',
            boxShadow: '0 4px 16px rgba(255,203,5,0.22)',
          }}>
            📷 {isMobile ? 'Camera' : 'Use Webcam'}
          </button>
        </div>
      )}

      {imgSrc && !busy && (
        <button onClick={() => { setImg(null); fileRef.current.value = ''; }} style={{
          display: 'block', margin: '0 auto 10px',
          background: 'none', border: 'none', color: '#6e7681', fontSize: '12px', cursor: 'pointer',
        }}>Choose a different image</button>
      )}

      {imgSrc && (
        <button onClick={handleProcess} disabled={busy} style={{
          width: '100%', padding: '16px', fontSize: '16px', fontWeight: 700,
          background: busy ? '#21262d' : 'linear-gradient(135deg, #ffcb05, #ff9d00)',
          color: busy ? '#6e7681' : '#0d1117',
          border: 'none', borderRadius: '14px',
          cursor: busy ? 'default' : 'pointer',
        }}>
          {busy ? '⟳ Processing…' : `Process ${totalCards} Card${totalCards !== 1 ? 's' : ''} →`}
        </button>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   IDENTIFY SCREEN
═══════════════════════════════════════════════ */

function IdentifyScreen({ cells, onBack, onAdd }) {
  const [idents, setIdents] = useState(() => Array(cells.length).fill(null));

  const handleSelect = useCallback((i, data) => {
    setIdents(prev => { const n = [...prev]; n[i] = data; return n; });
  }, []);

  const confirmed = idents.map((d, i) => d ? { ...d, cellImg: cells[i] } : null).filter(Boolean);
  const total     = confirmed.reduce((s, d) => s + (d.price || 0), 0);

  const handleAdd = () => {
    onAdd(confirmed.map(d => ({
      id:        `${d.card.id}_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
      cardId:    d.card.id,
      name:      d.card.name,
      set:       d.card.set?.name || d.card.id?.slice(0, d.card.id?.lastIndexOf('-')) || '',
      number:    d.card.localId || d.card.number || '',
      image:     d.card.image ? d.card.image + '/high.webp' : null,
      photo:     d.cellImg || null,
      price:     d.price,
      scannedAt: new Date().toISOString(),
    })));
  };

  return (
    <div style={{ padding: '16px', paddingBottom: confirmed.length > 0 ? '100px' : '16px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
        <button onClick={onBack} style={{
          background: 'none', border: 'none', color: '#58a6ff',
          fontSize: '15px', cursor: 'pointer', padding: '4px 0',
        }}>← Back</button>
        <h2 style={{ fontSize: '20px', fontWeight: 700 }}>Identify Cards</h2>
        <div style={{
          marginLeft: 'auto', background: '#21262d',
          borderRadius: '20px', padding: '3px 10px',
          fontSize: '11px', color: '#8b949e',
        }}>{confirmed.length}/{cells.length}</div>
      </div>

      <p style={{ fontSize: '13px', color: '#6e7681', marginBottom: '14px' }}>
        Type the Pokémon name shown on each card. Pick the correct version from the dropdown to confirm.
      </p>

      {cells.map((cell, i) => (
        <CardIdentifier
          key={i}
          index={i}
          cellImg={cell}
          onSelect={d => handleSelect(i, d)}
        />
      ))}

      {/* Sticky add bar */}
      {confirmed.length > 0 && (
        <div style={{
          position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)',
          width: '100%', maxWidth: '480px',
          padding: '12px 16px', background: '#161b22',
          borderTop: '1px solid #30363d',
          display: 'flex', alignItems: 'center', gap: '12px',
          boxShadow: '0 -4px 20px rgba(0,0,0,0.4)',
        }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: '13px', fontWeight: 600, color: '#e6edf3' }}>
              {confirmed.length} card{confirmed.length !== 1 ? 's' : ''} identified
            </div>
            <div style={{ fontSize: '12px', color: '#4fc3f7' }}>Scan total: {$p(total)}</div>
          </div>
          <button onClick={handleAdd} style={{
            padding: '12px 18px', fontSize: '14px', fontWeight: 700,
            background: 'linear-gradient(135deg, #ffcb05, #ff9d00)',
            color: '#0d1117', border: 'none', borderRadius: '10px',
            cursor: 'pointer', flexShrink: 0,
          }}>
            Add to Collection →
          </button>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   COLLECTION SCREEN
═══════════════════════════════════════════════ */

function CollectionScreen({ collection, onBack, onDelete, onScan, onPriceEdit }) {
  const [confirmId, setConfirmId] = useState(null);
  const [editPriceId, setEditPriceId] = useState(null);
  const [editPriceVal, setEditPriceVal] = useState('');

  const sorted = useMemo(
    () => [...collection].sort((a, b) => (b.price || 0) - (a.price || 0)),
    [collection]
  );
  const total = useMemo(() => collection.reduce((s, c) => s + (c.price || 0), 0), [collection]);
  const avg   = collection.length > 0 ? total / collection.length : 0;

  const handleDelete = id => {
    if (confirmId === id) { onDelete(id); setConfirmId(null); }
    else setConfirmId(id);
  };

  return (
    <div style={{ padding: '16px', paddingBottom: '90px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '20px' }}>
        <button onClick={onBack} style={{
          background: 'none', border: 'none', color: '#58a6ff',
          fontSize: '15px', cursor: 'pointer', padding: '4px 0',
        }}>← Back</button>
        <h2 style={{ fontSize: '20px', fontWeight: 700 }}>My Collection</h2>
      </div>

      {/* Stats bar */}
      <div style={{
        display: 'flex', background: '#161b22', borderRadius: '14px',
        padding: '16px', marginBottom: '20px', border: '1px solid #30363d',
      }}>
        {[
          { label: 'Cards',       value: collection.length, color: '#ffcb05' },
          { label: 'Total Value', value: $p(total),         color: '#4fc3f7' },
          { label: 'Avg / Card',  value: $p(avg),           color: '#81c784' },
        ].map((s, i) => (
          <React.Fragment key={s.label}>
            {i > 0 && <div style={{ width: '1px', background: '#30363d', margin: '0 4px' }} />}
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{ fontSize: '18px', fontWeight: 800, color: s.color, lineHeight: 1 }}>{s.value}</div>
              <div style={{ fontSize: '10px', color: '#6e7681', marginTop: '3px' }}>{s.label}</div>
            </div>
          </React.Fragment>
        ))}
      </div>

      {/* Empty state */}
      {sorted.length === 0 ? (
        <div style={{ textAlign: 'center', padding: '60px 20px', color: '#6e7681' }}>
          <div style={{ fontSize: '56px', marginBottom: '12px' }}>📭</div>
          <div style={{ fontWeight: 600, color: '#e6edf3', marginBottom: '6px' }}>No cards yet</div>
          <div style={{ fontSize: '13px', marginBottom: '20px' }}>Scan any number of cards to get started!</div>
          <button onClick={onScan} style={{
            padding: '12px 24px', fontSize: '14px', fontWeight: 700,
            background: 'linear-gradient(135deg, #ffcb05, #ff9d00)',
            color: '#0d1117', border: 'none', borderRadius: '10px', cursor: 'pointer',
          }}>📷 Scan Cards</button>
        </div>
      ) : (
        /* Card list sorted by price */
        sorted.map((card, idx) => (
          <div key={card.id} className="fade" style={{
            display: 'flex', alignItems: 'center', gap: '10px',
            padding: '11px', background: '#161b22', borderRadius: '12px',
            marginBottom: '7px', border: '1px solid #30363d',
          }}>
            {/* Rank */}
            <div style={{
              width: '26px', height: '26px', borderRadius: '50%', flexShrink: 0,
              background: idx === 0 ? '#ffd700' : idx === 1 ? '#c0c0c0' : idx === 2 ? '#cd7f32' : '#21262d',
              color: idx < 3 ? '#0d1117' : '#6e7681',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: '10px', fontWeight: 800,
            }}>{idx + 1}</div>

            {/* Card image */}
            {card.photo || card.image
              ? <img src={card.photo || card.image} alt="" style={{
                  width: '44px', height: '62px', objectFit: 'cover',
                  borderRadius: '4px', flexShrink: 0,
                }} />
              : <div style={{
                  width: '44px', height: '62px', background: '#21262d',
                  borderRadius: '4px', flexShrink: 0,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '20px',
                }}>⚪</div>
            }

            {/* Name + set */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{
                fontSize: '13px', fontWeight: 600, color: '#e6edf3',
                overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
              }}>{card.name}</div>
              <div style={{
                fontSize: '10px', color: '#6e7681',
                overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
              }}>{card.set}{card.number ? ` · #${card.number}` : ''}</div>
              <div style={{ fontSize: '10px', color: '#484f58' }}>
                {new Date(card.scannedAt).toLocaleDateString()}
              </div>
            </div>

            {/* Price — tap to edit */}
            {editPriceId === card.id ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                <span style={{ fontSize: '12px', color: '#6e7681' }}>$</span>
                <input
                  autoFocus
                  type="number"
                  min="0"
                  step="0.01"
                  value={editPriceVal}
                  onChange={e => setEditPriceVal(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') {
                      const p = parseFloat(editPriceVal);
                      onPriceEdit(card.id, isNaN(p) ? null : p);
                      setEditPriceId(null);
                    }
                    if (e.key === 'Escape') setEditPriceId(null);
                  }}
                  style={{
                    width: '72px', padding: '3px 5px', fontSize: '13px', fontWeight: 700,
                    background: '#0d1117', border: '1px solid #58a6ff',
                    borderRadius: '5px', color: '#e6edf3', textAlign: 'right',
                  }}
                />
                <button
                  onClick={() => {
                    const p = parseFloat(editPriceVal);
                    onPriceEdit(card.id, isNaN(p) ? null : p);
                    setEditPriceId(null);
                  }}
                  style={{
                    background: '#1f6feb', border: 'none', borderRadius: '4px',
                    color: '#fff', fontSize: '11px', padding: '3px 6px', cursor: 'pointer',
                  }}
                >✓</button>
              </div>
            ) : (
              <div
                onClick={() => { setEditPriceId(card.id); setEditPriceVal(card.price != null ? card.price.toFixed(2) : ''); }}
                title="Tap to edit price"
                style={{ fontSize: '14px', fontWeight: 800, color: $c(card.price), flexShrink: 0, cursor: 'pointer' }}
              >
                {$p(card.price)}
              </div>
            )}

            {/* Delete with one-tap confirm */}
            <button
              onClick={() => handleDelete(card.id)}
              onBlur={() => setConfirmId(null)}
              style={{
                background: confirmId === card.id ? '#f85149' : 'none',
                border: 'none',
                color: confirmId === card.id ? '#fff' : '#484f58',
                cursor: 'pointer', fontSize: '11px',
                padding: '4px 6px', borderRadius: '4px', flexShrink: 0,
                fontWeight: confirmId === card.id ? 700 : 400,
                transition: 'all 0.2s',
                whiteSpace: 'nowrap',
              }}
            >{confirmId === card.id ? 'Sure?' : '✕'}</button>
          </div>
        ))
      )}

      {/* Floating scan button */}
      {collection.length > 0 && (
        <button onClick={onScan} style={{
          position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)',
          padding: '13px 30px', fontSize: '14px', fontWeight: 700,
          background: 'linear-gradient(135deg, #ffcb05, #ff9d00)',
          color: '#0d1117', border: 'none', borderRadius: '30px', cursor: 'pointer',
          boxShadow: '0 4px 20px rgba(255,203,5,0.28)',
          whiteSpace: 'nowrap',
        }}>
          📷 Scan More Cards
        </button>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════ */

function App() {
  const [screen, setScreen] = useState('home');
  const [cells,  setCells]  = useState([]);
  const [collection, setColl] = useState(loadColl);

  useEffect(() => { saveColl(collection); }, [collection]);

  const go = s => () => setScreen(s);

  if (screen === 'home') return (
    <HomeScreen
      collection={collection}
      onScan={go('scan')}
      onView={go('collection')}
    />
  );

  if (screen === 'scan') return (
    <ScanScreen
      onBack={go('home')}
      onCellsReady={c => { setCells(c); setScreen('identify'); }}
    />
  );

  if (screen === 'identify') return (
    <IdentifyScreen
      cells={cells}
      onBack={go('scan')}
      onAdd={cards => { setColl(p => [...p, ...cards]); setScreen('collection'); }}
    />
  );

  if (screen === 'collection') return (
    <CollectionScreen
      collection={collection}
      onBack={go('home')}
      onScan={go('scan')}
      onDelete={id => setColl(p => p.filter(c => c.id !== id))}
      onPriceEdit={(id, price) => setColl(p => p.map(c => c.id === id ? { ...c, price } : c))}
    />
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
