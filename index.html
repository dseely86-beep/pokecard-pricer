async function splitImage(src, rows, cols) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const cw = Math.floor(img.width / cols);
      const ch = Math.floor(img.height / rows);
      const cells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cv = document.createElement('canvas');
          cv.width = cw; cv.height = ch;
          cv.getContext('2d').drawImage(img, c * cw, r * ch, cw, ch, 0, 0, cw, ch);
          cells.push(cv.toDataURL('image/jpeg', 0.85));
        }
      }
      res(cells);
    };
    img.onerror = rej;
    img.src = src;
  });
}

async function searchCards(query) {
  if (!query || query.trim().length < 2) return [];
  const q = query.trim();
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000);

  const fetchLang = async (lang, name) => {
    try {
      const r = await fetch(
        `https://api.tcgdex.net/v2/${lang}/cards?name=${encodeURIComponent(name)}`,
        { signal: controller.signal }
      );
      if (!r.ok) return [];
      const d = await r.json();
      if (!Array.isArray(d)) return [];
      d.forEach(c => { c._lang = lang; });
      return d;
    } catch { return []; }
  };

  try {
    // Search EN + JA in parallel
    const [en, ja] = await Promise.all([fetchLang('en', q), fetchLang('ja', q)]);
    clearTimeout(timeout);
    const combined = [...en, ...ja];
    if (combined.length > 0) return combined.slice(0, 40);

    // Fallback: first word only
    const [en2, ja2] = await Promise.all([
      fetchLang('en', q.split(' ')[0]),
      fetchLang('ja', q.split(' ')[0]),
    ]);
    return [...en2, ...ja2].slice(0, 40);
  } catch { return []; }
}

async function ocrCardName(imgSrc) {
  try {
    // Crop top ~22% of the image 芒聙聰 that's where the name lives on most cards
    const img = await new Promise((res, rej) => {
      const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = imgSrc;
    });
    const canvas = document.createElement('canvas');
    const cropH = Math.max(40, Math.floor(img.height * 0.22));
    canvas.width = img.width; canvas.height = cropH;
    canvas.getContext('2d').drawImage(img, 0, 0, img.width, cropH, 0, 0, img.width, cropH);
    const cropped = canvas.toDataURL('image/jpeg', 0.92);
    const result = await Tesseract.recognize(cropped, 'eng', { logger: () => {} });
    const raw = result.data.text || '';
    // Clean up: remove non-name characters, pick the best candidate line
    const lines = raw.split('\n')
      .map(l => l.replace(/[^a-zA-Z\s'\-.脙漏脙聣]/g, ' ').trim())
      .filter(l => l.length >= 2);
    const name = lines.find(l => /[a-zA-Z]{2,}/.test(l) && !/^hp$/i.test(l.trim())) || lines[0] || '';
    return name.replace(/\s+/g, ' ').trim();
  } catch { return ''; }
}

function getPrice(card) {
  if (!card) return null;
  // TCGdex format
  const p = card.pricing;
  if (p) {
    // TCGPlayer USD (preferred)
    const tp = p.tcgplayer;
    if (tp) {
      for (const v of ['holofoil','reverseHolofoil','normal','unlimitedHolofoil',
                       'unlimited','1stEditionHolofoil','1stEditionNormal']) {
        if (tp[v]?.market != null) return tp[v].market;
      }
      for (const v of Object.keys(tp)) {
        if (tp[v]?.market != null) return tp[v].market;
      }
    }
    // Cardmarket EUR (fallback 芒聙聰 close enough for ballpark)
    if (p.cardmarket?.avg != null)   return p.cardmarket.avg;
    if (p.cardmarket?.trend != null) return p.cardmarket.trend;
  }
  // Legacy pokemontcg.io format (backwards compat)
  const tpl = card.tcgplayer?.prices;
  if (tpl) {
    for (const v of ['holofoil','reverseHolofoil','normal']) {
      if (tpl[v]?.market != null) return tpl[v].market;
    }
  }
  return null;
}

// Cache search results so the same name never hits the API twice
const _searchCache = new Map();
// Cache full card details (for price + set name) so each card is only fetched once
const _detailCache = new Map();

  const doSearch = async (name) => {
    const key = name.trim().toLowerCase();
    if (key.length < 2) return;
    setError('');
    // Return cached result instantly
    if (_searchCache.has(key)) {
      const cached = _searchCache.get(key);
      setRes(cached); setOpen(cached.length > 0);
      if (cached.length === 0) setError('No cards found 芒聙聰 try a different spelling');
      return;
    }
    setLoad(true);
    const r = await searchCards(name.trim());
    setLoad(false);
    _searchCache.set(key, r);
    setRes(r); setOpen(r.length > 0);
    if (r.length === 0) setError('No cards found 芒聙聰 try a different spelling');
  };

  useEffect(() => {
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };

      if (_detailCache.has(key)) {

      } else {
        const lang = basicCard._lang || 'en';
        const r = await fetch(`https://api.tcgdex.net/v2/${lang}/cards/${basicCard.id}`);
        if (r.ok) { full = await r.json(); full._lang = lang; _detailCache.set(key, full); }

      setSel({ card: full, price });
      onSelect({ card: full, price });

function Stepper({ label, value, min, max, onChange }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
      <div style={{ fontSize: '10px', color: '#6e7681', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{label}</div>

function ScanScreen({ onBack, onCellsReady }) {

    ('ontouchstart' in window || navigator.maxTouchPoints > 0);

  /* 芒聰聙芒聰聙 webcam 芒聰聙芒聰聙 */
  const startWebcam = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      });
      setStream(s);
      setWcamOn(true);
      setTimeout(() => { if (videoRef.current) videoRef.current.srcObject = s; }, 80);
    } catch (e) {
      alert('Could not access camera: ' + e.message);
    }
  };

  const stopWebcam = () => {
    if (stream) stream.getTracks().forEach(t => t.stop());
    setStream(null); setWcamOn(false);
  };

    const v = videoRef.current;
    if (!v) return;
    const cv = document.createElement('canvas');
    cv.width = v.videoWidth; cv.height = v.videoHeight;
    cv.getContext('2d').drawImage(v, 0, 0);
    setImg(cv.toDataURL('image/jpeg', 0.92));
    stopWebcam();
  };

  useEffect(() => () => { if (stream) stream.getTracks().forEach(t => t.stop()); }, [stream]);

  /* 芒聰聙芒聰聙 file / drag 芒聰聙芒聰聙 */
  const loadFile = f => {

    const r = new FileReader();
    r.onload = ev => setImg(ev.target.result);
    r.readAsDataURL(f);

function App() {
  const [screen, setScreen] = useState('home');
  const [cells,  setCells]  = useState([]);
  const [collection, setColl] = useState(loadColl);

  useEffect(() => { saveColl(collection); }, [collection]);

  const go = s => () => setScreen(s);

  if (screen === 'home') return (
    <HomeScreen
      collection={collection}
      onScan={go('scan')}
      onView={go('collection')}
    />
  );

  if (screen === 'scan') return (
    <ScanScreen
      onBack={go('home')}
      onCellsReady={c => { setCells(c); setScreen('identify'); }}
    />
  );

  if (screen === 'identify') return (
    <IdentifyScreen
      cells={cells}
      onBack={go('scan')}
      onAdd={cards => { setColl(p => [...p, ...cards]); setScreen('collection'); }}
    />
  );

  if (screen === 'collection') return (
    <CollectionScreen
      collection={collection}
      onBack={go('home')}
      onScan={go('scan')}
      onDelete={id => setColl(p => p.filter(c => c.id !== id))}
      onPriceEdit={(id, price) => setColl(p => p.map(c => c.id === id ? { ...c, price } : c))}
    />
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
